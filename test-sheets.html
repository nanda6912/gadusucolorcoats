<!DOCTYPE html>
<html>
<head>
    <title>Google Sheets Test</title>
</head>
<body>
    <h1>Google Sheets Integration Test</h1>
    <button onclick="testGoogleSheets()">Test Google Sheets</button>
    <div id="result"></div>

    <script src="google-sheets-config.js"></script>
    <script>
        async function testGoogleSheets() {
            const testData = {
                name: 'Test User',
                phone: '1234567890',
                email: 'test@example.com',
                service: 'interior',
                location: 'Test Location',
                message: 'Test message',
                date: '2026-03-20'
            };
            
            try {
                console.log('Testing Google Sheets integration...');
                const result = await appendToGoogleSheet(testData);
                document.getElementById('result').innerHTML = `
                    <h3>Result:</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('Test failed:', error);
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
